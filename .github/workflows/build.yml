name: Build desktop app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NEXT_PUBLIC_API_URL: https://api.eduignite.online/api/v1
  NEXT_PUBLIC_APP_URL: https://eduignite.online

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Next.js (standalone) + prepare
        run: npm run app:build

      - name: Package Windows installer
        run: npm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: eduignite-windows-setup
          path: release/*.exe

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: EduIgnite Desktop v1.0.${{ github.run_number }}
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
